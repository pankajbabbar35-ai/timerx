<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="InviteCraft - Editable Invitation Card Editor. Design and customize your digital invitation cards with real-time preview.">
    <title>InviteCraft - Invitation Card Editor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%237C3AED'>✉</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Editor Specific Styles */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem 0;
            min-height: calc(100vh - 100px);
        }

        .editor-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: 90vh;
            overflow-y: auto;
            padding-right: 1rem;
        }

        .editor-panel::-webkit-scrollbar {
            width: 8px;
        }

        .editor-panel::-webkit-scrollbar-track {
            background: var(--light);
        }

        body.dark-mode .editor-panel::-webkit-scrollbar-track {
            background: var(--dark);
        }

        .editor-panel::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--darker);
            font-size: 0.95rem;
        }

        body.dark-mode .form-label {
            color: #E5E7EB;
        }

        .form-input, .form-select, .form-textarea {
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: var(--lighter);
            color: var(--text);
        }

        body.dark-mode .form-input,
        body.dark-mode .form-select,
        body.dark-mode .form-textarea {
            background: #1F2937;
            border-color: #374151;
            color: #E5E7EB;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .color-picker-group {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .color-input-wrapper {
            flex: 1;
        }

        .color-input-wrapper input {
            width: 100%;
            height: 50px;
            border: 2px solid var(--border);
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 80px;
        }

        .preview-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-preview {
            border-radius: 1rem;
            padding: 2rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .card-preview.dragging {
            opacity: 0.8;
        }

        .card-image {
            position: absolute;
            top: 0;
            left: 0;
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            cursor: move;
            border-radius: 0.5rem;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .card-host {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .card-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .card-date {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .card-time {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .card-venue {
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .card-description {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 1rem;
            max-width: 90%;
        }

        .card-contact {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-download, .btn-share, .btn-print, .btn-back {
            flex: 1;
            min-width: 150px;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn-download {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-share {
            background: var(--success);
            color: white;
        }

        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-print {
            background: var(--accent);
            color: white;
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-back {
            background: var(--light);
            color: var(--darker);
            border: 2px solid var(--border);
        }

        body.dark-mode .btn-back {
            background: #1F2937;
            color: #E5E7EB;
            border-color: #374151;
        }

        .btn-back:hover {
            background: var(--border);
        }

        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 1rem 0;
        }

        body.dark-mode .section-divider {
            background: #374151;
        }

        .message {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .font-selector, .template-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.75rem;
        }

        .font-option, .template-option {
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 0.5rem;
            background: var(--lighter);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.9rem;
        }

        body.dark-mode .font-option,
        body.dark-mode .template-option {
            background: #1F2937;
            border-color: #374151;
        }

        .font-option:hover, .template-option:hover,
        .font-option.active, .template-option.active {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.1);
        }

        @media (max-width: 1200px) {
            .editor-container {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .preview-container {
                position: static;
                top: auto;
            }

            .editor-panel {
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column;
            }

            .btn-download, .btn-share, .btn-print, .btn-back {
                min-width: 100%;
            }

            .card-preview {
                min-height: 300px;
            }

            .card-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="index.html" class="logo">
                    <span class="logo-icon">✉</span>
                    <span class="logo-text">InviteCraft</span>
                </a>
                <div class="nav-actions">
                    <button id="darkModeToggle" class="dark-mode-btn" title="Toggle Dark Mode">🌙</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="editor-container">
            <!-- Editor Panel -->
            <div class="editor-panel">
                <div class="message" id="message"></div>

                <!-- Template Selector -->
                <div class="form-group">
                    <label class="form-label">Select Template</label>
                    <div class="template-selector" id="templateSelector">
                        <!-- Templates populated by JS -->
                    </div>
                </div>

                <div class="section-divider"></div>

                <!-- Event Details -->
                <h3 style="color: var(--primary); margin: 0;">Event Details</h3>

                <div class="form-group">
                    <label class="form-label">Host Name</label>
                    <input type="text" class="form-input" id="hostName" placeholder="e.g., John & Sarah">
                </div>

                <div class="form-group">
                    <label class="form-label">Event Title</label>
                    <input type="text" class="form-input" id="eventTitle" placeholder="e.g., Wedding Ceremony">
                </div>

                <div class="form-group">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-input" id="eventDate">
                </div>

                <div class="form-group">
                    <label class="form-label">Time</label>
                    <input type="time" class="form-input" id="eventTime">
                </div>

                <div class="form-group">
                    <label class="form-label">Venue</label>
                    <input type="text" class="form-input" id="venue" placeholder="e.g., Grand Hotel, City Center">
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="description" placeholder="Add details about the event..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" class="form-input" id="contact" placeholder="e.g., +1 (555) 123-4567">
                </div>

                <div class="section-divider"></div>

                <!-- Design Options -->
                <h3 style="color: var(--primary); margin: 0;">Design Options</h3>

                <div class="form-group">
                    <label class="form-label">Font Family</label>
                    <div class="font-selector" id="fontSelector">
                        <button class="font-option active" data-font="Arial" style="font-family: Arial;">Arial</button>
                        <button class="font-option" data-font="Georgia" style="font-family: Georgia;">Georgia</button>
                        <button class="font-option" data-font="Courier New" style="font-family: 'Courier New';">Courier</button>
                        <button class="font-option" data-font="Verdana" style="font-family: Verdana;">Verdana</button>
                        <button class="font-option" data-font="Trebuchet MS" style="font-family: 'Trebuchet MS';">Trebuchet</button>
                        <button class="font-option" data-font="Comic Sans MS" style="font-family: 'Comic Sans MS';">Comic</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Title Font Size</label>
                    <input type="range" class="form-input" id="titleFontSize" min="20" max="60" value="32" style="padding: 0.5rem;">
                    <span style="font-size: 0.85rem; color: var(--text-light);">Size: <span id="fontSizeDisplay">32</span>px</span>
                </div>

                <div class="color-picker-group">
                    <div class="color-input-wrapper">
                        <label class="form-label">Text Color</label>
                        <input type="color" id="textColor" value="#FFFFFF">
                    </div>
                    <div class="color-input-wrapper">
                        <label class="form-label">Background Color</label>
                        <input type="color" id="bgColor" value="#667EEA">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Upload Background Image</label>
                    <input type="file" class="form-input" id="bgImage" accept="image/*">
                    <small style="color: var(--text-light);">Drag the image in preview to reposition</small>
                </div>

                <div class="section-divider"></div>

                <!-- Action Buttons -->
                <div class="button-group">
                    <button class="btn-download" id="downloadBtn">
                        📥 Download
                    </button>
                    <button class="btn-print" id="printBtn">
                        🖨️ Print
                    </button>
                </div>

                <div class="button-group">
                    <a href="index.html" class="btn-back">← Back to Home</a>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="preview-container">
                <div class="preview-label">📋 Live Preview</div>
                <div class="card-preview" id="cardPreview">
                    <div class="card-content">
                        <div class="card-host" id="previewHost">Host Name</div>
                        <div class="card-title" id="previewTitle">Event Title</div>
                        <div class="card-date" id="previewDate">📅 Select a date</div>
                        <div class="card-time" id="previewTime">🕐 Select a time</div>
                        <div class="card-venue" id="previewVenue">📍 Enter venue</div>
                        <div class="card-description" id="previewDescription">Add description here...</div>
                        <div class="card-contact" id="previewContact">📞 Contact number</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="editor.js"></script>
</body>
</html>
