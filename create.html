<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Timer — TimerX</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">⏱ TimerX</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="create.html" class="nav-link active">Create Timer</a>
        <a href="my-timers.html" class="nav-link">My Timers</a>
      </div>
      <a href="create.html" class="btn-primary">+ New Timer</a>
    </div>
  </nav>

  <div class="create-layout">

    <!-- FORM -->
    <div class="create-form-panel">
      <h1 class="page-title">Create Your Timer</h1>

      <div class="form-section">
        <label class="form-label">Timer Name *</label>
        <input type="text" id="timerName" class="form-input" placeholder="e.g. My Birthday, IPL 2026 Final..." maxlength="60" />
      </div>

      <div class="form-section">
        <label class="form-label">Target Date & Time *</label>
        <input type="datetime-local" id="timerDate" class="form-input" />
      </div>

      <div class="form-section">
        <label class="form-label">Category / Emoji</label>
        <div class="emoji-grid" id="emojiGrid">
          <button class="emoji-btn active" data-emoji="🎉">🎉 Event</button>
          <button class="emoji-btn" data-emoji="🎂">🎂 Birthday</button>
          <button class="emoji-btn" data-emoji="🎄">🎄 Holiday</button>
          <button class="emoji-btn" data-emoji="💍">💍 Wedding</button>
          <button class="emoji-btn" data-emoji="📚">📚 Exam</button>
          <button class="emoji-btn" data-emoji="🏆">🏆 Sports</button>
          <button class="emoji-btn" data-emoji="✈️">✈️ Travel</button>
          <button class="emoji-btn" data-emoji="🚀">🚀 Launch</button>
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">Timer Theme</label>
        <div class="theme-grid" id="themeGrid">
          <button class="theme-btn active" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="purple">Purple</button>
          <button class="theme-btn" data-theme="ocean">Ocean</button>
          <button class="theme-btn" data-theme="fire">Fire</button>
          <button class="theme-btn" data-theme="forest">Forest</button>
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">Display Style</label>
        <div class="style-grid" id="styleGrid">
          <button class="style-btn active" data-style="flip">Flip</button>
          <button class="style-btn" data-style="minimal">Minimal</button>
          <button class="style-btn" data-style="bold">Bold</button>
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">Message (optional)</label>
        <input type="text" id="timerMsg" class="form-input" placeholder="e.g. Can't wait!" maxlength="100" />
      </div>

      <div class="form-section">
        <label class="form-label">Timezone</label>
        <select id="timerTZ" class="form-input">
          <option value="Asia/Kolkata">India (IST)</option>
          <option value="UTC">UTC</option>
          <option value="America/New_York">New York (EST)</option>
          <option value="America/Los_Angeles">Los Angeles (PST)</option>
          <option value="Europe/London">London (GMT)</option>
          <option value="Europe/Paris">Paris (CET)</option>
          <option value="Asia/Dubai">Dubai (GST)</option>
          <option value="Asia/Tokyo">Tokyo (JST)</option>
          <option value="Australia/Sydney">Sydney (AEST)</option>
        </select>
      </div>

      <button class="btn-primary btn-lg btn-full" id="createBtn" onclick="createTimer()">
        Create & Get Link →
      </button>
    </div>

    <!-- LIVE PREVIEW -->
    <div class="preview-panel">
      <div class="preview-label">Live Preview</div>
      <div class="timer-preview-wrap" id="previewWrap">
        <div class="timer-card" id="previewCard" data-theme="dark">
          <div class="tc-emoji" id="prevEmoji">🎉</div>
          <div class="tc-name" id="prevName">Your Timer Name</div>
          <div class="tc-date" id="prevDate">—</div>
          <div class="tc-digits" id="prevDigits">
            <div class="tcd-block"><span class="tcd-num" id="pd">00</span><span class="tcd-label">Days</span></div>
            <div class="tcd-sep">:</div>
            <div class="tcd-block"><span class="tcd-num" id="ph">00</span><span class="tcd-label">Hours</span></div>
            <div class="tcd-sep">:</div>
            <div class="tcd-block"><span class="tcd-num" id="pm">00</span><span class="tcd-label">Mins</span></div>
            <div class="tcd-sep">:</div>
            <div class="tcd-block"><span class="tcd-num" id="ps">00</span><span class="tcd-label">Secs</span></div>
          </div>
          <div class="tc-msg" id="prevMsg"></div>
        </div>
      </div>

      <div id="resultBox" class="result-box" style="display:none">
        <p class="result-label">🎉 Your timer is ready!</p>
        <div class="link-box">
          <input type="text" id="shareLink" class="link-input" readonly />
          <button class="btn-copy" onclick="copyLink()">Copy</button>
        </div>
        <div class="share-btns">
          <button class="share-btn whatsapp" onclick="shareWhatsApp()">📱 WhatsApp</button>
          <button class="share-btn twitter" onclick="shareTwitter()">🐦 Twitter</button>
          <a class="share-btn view" id="viewBtn" href="#" target="_blank">🔗 Open Timer</a>
        </div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const typeMap = {
      birthday: '🎂', event: '🎉', holiday: '🎄',
      wedding: '💍', exam: '📚', sports: '🏆'
    };
    if (params.get('type') && typeMap[params.get('type')]) {
      document.querySelectorAll('.emoji-btn').forEach(b => {
        b.classList.remove('active');
        if (b.dataset.emoji === typeMap[params.get('type')]) b.classList.add('active');
      });
    }

    const minDate = new Date();
    minDate.setMinutes(minDate.getMinutes() + 1);
    document.getElementById('timerDate').min = minDate.toISOString().slice(0,16);

    document.querySelectorAll('.emoji-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('prevEmoji').textContent = btn.dataset.emoji;
        updatePreview();
      };
    });

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('previewCard').dataset.theme = btn.dataset.theme;
      };
    });

    document.querySelectorAll('.style-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('previewCard').dataset.style = btn.dataset.style;
      };
    });

    document.getElementById('timerName').addEventListener('input', updatePreview);
    document.getElementById('timerDate').addEventListener('input', updatePreview);
    document.getElementById('timerMsg').addEventListener('input', () => {
      document.getElementById('prevMsg').textContent = document.getElementById('timerMsg').value;
    });

    function updatePreview() {
      const name = document.getElementById('timerName').value || 'Your Timer Name';
      const dateVal = document.getElementById('timerDate').value;
      document.getElementById('prevName').textContent = name;
      if (dateVal) {
        const d = new Date(dateVal);
        document.getElementById('prevDate').textContent = d.toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'});
      }
    }

    let previewInterval;
    function startPreviewTick() {
      if (previewInterval) clearInterval(previewInterval);
      previewInterval = setInterval(() => {
        const dateVal = document.getElementById('timerDate').value;
        if (!dateVal) return;
        const now = new Date(), target = new Date(dateVal);
        let diff = Math.floor((target - now) / 1000);
        if (diff < 0) diff = 0;
        document.getElementById('pd').textContent = String(Math.floor(diff/86400)).padStart(2,'0');
        document.getElementById('ph').textContent = String(Math.floor((diff%86400)/3600)).padStart(2,'0');
        document.getElementById('pm').textContent = String(Math.floor((diff%3600)/60)).padStart(2,'0');
        document.getElementById('ps').textContent = String(diff%60).padStart(2,'0');
      }, 1000);
    }
    startPreviewTick();
    document.getElementById('timerDate').addEventListener('change', startPreviewTick);

    function createTimer() {
      const name = document.getElementById('timerName').value.trim();
      const dateVal = document.getElementById('timerDate').value;
      if (!name) { alert('Please enter a timer name!'); return; }
      if (!dateVal) { alert('Please select a target date!'); return; }
      const emoji = document.querySelector('.emoji-btn.active')?.dataset.emoji || '🎉';
      const theme = document.querySelector('.theme-btn.active')?.dataset.theme || 'dark';
      const style = document.querySelector('.style-btn.active')?.dataset.style || 'flip';
      const msg = document.getElementById('timerMsg').value.trim();
      const tz = document.getElementById('timerTZ').value;

      const params = new URLSearchParams({
        name, date: dateVal, emoji, theme, style, msg, tz
      });
      const link = `${window.location.origin}${window.location.pathname.replace('create.html','timer.html')}?${params.toString()}`;

      document.getElementById('shareLink').value = link;
      document.getElementById('viewBtn').href = link;

      const saved = JSON.parse(localStorage.getItem('timerx_timers') || '[]');
      saved.unshift({ name, date: dateVal, emoji, theme, style, msg, tz, link, created: Date.now() });
      localStorage.setItem('timerx_timers', JSON.stringify(saved.slice(0,50)));

      document.getElementById('resultBox').style.display = 'block';
      document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
    }

    function copyLink() {
      const val = document.getElementById('shareLink').value;
      navigator.clipboard.writeText(val).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    function shareWhatsApp() {
      const link = document.getElementById('shareLink').value;
      const name = document.getElementById('timerName').value;
      window.open(`https://wa.me/?text=Check%20out%20my%20countdown%20timer%20for%20${encodeURIComponent(name)}!%20${encodeURIComponent(link)}`);
    }
    function shareTwitter() {
      const link = document.getElementById('shareLink').value;
      const name = document.getElementById('timerName').value;
      window.open(`https://twitter.com/intent/tweet?text=Counting%20down%20to%20${encodeURIComponent(name)}%20%F0%9F%8E%89&url=${encodeURIComponent(link)}`);
    }
  </script>
</body>
</html>
